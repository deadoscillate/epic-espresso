<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Epic Espresso Bar — Status</title>
    <meta name="description" content="Live coffee status board." />
    <script>
      // Capture the install prompt as early as possible so the button can use it.
      window.__deferredInstall = null;
      addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__deferredInstall = e;
      });
    </script>

    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" />
    <link rel="icon" href="/assets/img/epic-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#173a5e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Espresso" />

    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/display.css" />

    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Vercel Speed Insights -->
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </head>
  <body data-status="closed">
    <main class="display">
      <div class="display__top">
        <div class="display__brand">
          <img class="display__mark" src="/assets/img/epic-icon.svg" alt="" width="44" height="44" />
          <h1 class="display__title">The Brendan Spurlock Memorial Espresso Bar</h1>
        </div>
        <div class="display__controls">
          <span class="conn" id="connection" role="status" aria-live="polite">
            <span class="conn-dot" aria-hidden="true"></span>
            <span class="conn-text">Connecting…</span>
          </span>
          <button type="button" class="icon-btn" id="install-btn" title="Install app" aria-label="Install app" hidden>⤓</button>
          <button
            type="button"
            class="icon-btn"
            id="sound-btn"
            aria-pressed="true"
            title="Order chime"
            aria-label="Toggle order chime"
          >
            🔔
          </button>
          <button
            type="button"
            class="icon-btn"
            id="fullscreen-btn"
            aria-pressed="false"
            aria-label="Toggle fullscreen"
            title="Toggle fullscreen"
          >
            ⛶
          </button>
        </div>
      </div>

      <p class="install-hint" id="install-hint" hidden></p>

      <div class="manager-badge" id="manager-badge" hidden>
        <span id="manager-badge-text"></span>
      </div>

      <div class="display__stage">
        <figure class="display__figure">
          <img class="display__card" id="display-card" alt="" hidden />
          <div class="display__fallback" id="display-fallback" hidden>
            <div class="display__icon" id="display-icon" aria-hidden="true">🌙</div>
            <h2 class="display__status" id="display-status">—</h2>
            <p class="display__tagline" id="display-tagline"></p>
          </div>
        </figure>
        <p class="display__message" id="display-message" hidden></p>
        <p class="visually-hidden" id="display-live" role="status" aria-live="polite"></p>
      </div>

      <section class="orders" id="orders" aria-label="Order queue" hidden>
        <h2 class="orders__heading">Orders</h2>
        <ul class="orders__list" id="orders-list"></ul>
      </section>

      <footer class="display__footer">
        <span>Updated <span id="updated-abs">—</span></span>
        <span class="dot" aria-hidden="true">•</span>
        <span id="updated-rel">never</span>
      </footer>

      <div class="order-flash" id="order-flash" hidden>
        <div class="order-flash__card">
          <div class="order-flash__icon" aria-hidden="true">☕</div>
          <div class="order-flash__text" id="order-flash-text">Order ready!</div>
        </div>
      </div>
    </main>

    <script type="module" src="../assets/js/display.js"></script>
  </body>
</html>
